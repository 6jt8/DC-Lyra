name: Nightly Build

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate nightly version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          BASE_TAG=$(git describe --tags --abbrev=0 --match 'nv[0-9]*.[0-9]*.[0-9]*-[0-9]*' 2>/dev/null || true)
          if [ -z "${BASE_TAG:-}" ]; then
            RELEASE_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' HEAD 2>/dev/null || true)
            if [ -n "${RELEASE_TAG:-}" ]; then
              BASE_TAG="nv${RELEASE_TAG#v}-0"
            else
              BASE_TAG="nv0.0.0-0"
            fi
          fi
          CLEAN_VERSION=$(echo "$BASE_TAG" | sed -E 's/^nv([0-9]+\.[0-9]+\.[0-9]+)-[0-9]+$/\1/')
          BUILD_NUM="${BASE_TAG##*-}"
          if ! [[ "$BUILD_NUM" =~ ^[0-9]+$ ]]; then
            BUILD_NUM=0
          fi
          BUILD_NUM=$((BUILD_NUM + 1))
          TAG="nv${CLEAN_VERSION}-${BUILD_NUM}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "type=Nightly" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full zip

      - name: Build
        run: |
          npm install
          npm run build
          if [ ! -d "dist" ]; then
            echo "ERROR: Build did not produce a 'dist' directory"
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'nv*' HEAD~1 2>/dev/null || true)
          if [ -z "${PREV_TAG:-}" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' HEAD 2>/dev/null || true)
          fi
          COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || true)
          if [ -z "${COMMITS:-}" ]; then
            echo "### What's Changed" > changelog_body.txt
            echo "" >> changelog_body.txt
            echo "- Keine neuen Änderungen seit der letzten Nightly" >> changelog_body.txt
            exit 0
          fi
          MERGE_LOG=$(git log "${PREV_TAG}..HEAD" --merges --pretty=format:"%s" 2>/dev/null || true)
          SEEN_AUTHORS=()
          AUTHORS_LIST=()
          while IFS= read -r line; do
            if echo "$line" | grep -qP 'Merge pull request #\d+ from [^/]+/'; then
              AUTHOR=$(echo "$line" | grep -oP 'from \K[^/]+')
              if [ -n "${AUTHOR:-}" ] && [ "$AUTHOR" != "6jt8" ] && ! echo "$AUTHOR" | grep -q '\['; then
                ALREADY_SEEN=false
                for S in "${SEEN_AUTHORS[@]}"; do
                  if [ "$S" = "$AUTHOR" ]; then
                    ALREADY_SEEN=true
                    break
                  fi
                done
                if [ "$ALREADY_SEEN" = false ]; then
                  SEEN_AUTHORS+=("$AUTHOR")
                  AUTHORS_LIST+=("$AUTHOR")
                fi
              fi
            fi
          done <<< "$MERGE_LOG"
          NOTES="### What's Changed"
          NOTES+=$'\n\n'"${COMMITS}"
          NOTES+=$'\n'
          NUM_AUTHORS=${#AUTHORS_LIST[@]}
          if [ "$NUM_AUTHORS" -gt 0 ]; then
            THANKS=""
            for i in "${!AUTHORS_LIST[@]}"; do
              AUTHOR="${AUTHORS_LIST[$i]}"
              if [ "$i" -gt 0 ]; then
                if [ "$i" -eq $((NUM_AUTHORS - 1)) ]; then
                  THANKS+=", and "
                else
                  THANKS+=", "
                fi
              fi
              THANKS+="[$AUTHOR](https://github.com/$AUTHOR)"
            done
            if [ "$NUM_AUTHORS" -eq 1 ]; then
              NOTES+=$'\n\n'"**Big thanks to $THANKS for their contribution!**"
            else
              NOTES+=$'\n\n'"**Big thanks to $THANKS for their contributions!**"
            fi
          fi
          echo "$NOTES" > changelog_body.txt

      - name: Create nightly tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Nightly ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Prepare dist archives
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf dist-package
          mkdir -p dist-package
          cp -r dist dist-package/
          cp package.json dist-package/
          cp package-lock.json dist-package/ 2>/dev/null || true
          cp bun.lock dist-package/ 2>/dev/null || true
          cp .env.example dist-package/
          cp tsconfig.json dist-package/
          cd dist-package
          zip -r "../lyra-music-${VERSION}-dist.zip" .
          cd ..

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          name: "Nightly Release"
          body_path: changelog_body.txt
          files: |
            lyra-music-*-dist.zip
          draft: false
          prerelease: true
